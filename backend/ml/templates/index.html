<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pollution Hotspot Predictor</title>
    <meta name="description" content="Predict future PM2.5 air quality using real-time machine learning.">
    
    <!-- Leaflet CSS & JS for Interactive Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Abstract Background Elements */
        .bg-circle1, .bg-circle2 {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
        }
        .bg-circle1 {
            width: 400px; height: 400px;
            background: rgba(0, 242, 254, 0.4);
            top: -100px; left: -100px;
        }
        .bg-circle2 {
            width: 300px; height: 300px;
            background: rgba(79, 172, 254, 0.3);
            bottom: -50px; right: -50px;
        }

        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 480px;
            max-height: 95vh;
            overflow-y: auto;
            box-shadow: 0 15px 35px 0 rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 600;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        p.subtitle {
            font-size: 15px;
            color: #a0aab2;
            margin-bottom: 35px;
        }

        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus {
            border-color: #4facfe;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.3);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
        }

        button::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        button:hover::after {
            left: 150%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 242, 254, 0.4);
        }

        button.outline {
            background: transparent;
            border: 1px solid rgba(79, 172, 254, 0.6);
            color: #4facfe;
        }

        button.outline:hover {
            background: rgba(79, 172, 254, 0.1);
            box-shadow: none;
        }

        .results {
            margin-top: 35px;
            display: none;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card h3 {
            font-size: 15px;
            font-weight: 400;
            color: #ccc;
        }

        .card .value {
            font-size: 32px;
            font-weight: 600;
        }

        .value.current { color: #f6d365; }
        .value.predict { color: #ff0844; }

        .api-note {
            font-size: 12px;
            color: #888;
            margin-top: 25px;
        }

        .loader {
            display: none;
            margin: 30px auto;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-left-color: #00f2fe;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { 
            0% { opacity: 0; transform: translateY(20px) scale(0.95); } 
            100% { opacity: 1; transform: translateY(0) scale(1); } 
        }

    </style>
</head>
<body>
    
    <div class="bg-circle1"></div>
    <div class="bg-circle2"></div>

    <div class="container">
        <h1>Pollution Hotspot AI</h1>
        <p class="subtitle">Live PM2.5 Prediction Engine</p>

        <button class="outline" id="locationBtn" onclick="getLocation()">
            📍 Use My Realtime Location
        </button>

        <!-- Interactive Map Wrapper -->
        <div id="map" style="height: 240px; border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.1); z-index: 1;"></div>

        <div class="input-group">
            <input type="number" id="lat" placeholder="Latitude (e.g. 39.98)" step="0.0001">
            <input type="number" id="lon" placeholder="Longitude (e.g. 116.39)" step="0.0001">
        </div>

        <button onclick="predict()">🔮 Run Prediction</button>

        <div class="loader" id="loader"></div>

        <div class="results" id="results">
            <div class="card">
                <h3>Current PM2.5</h3>
                <div class="value current" id="current_val">--</div>
            </div>
            
            <div class="card" style="background: rgba(255,8,68,0.05); border-color: rgba(255,8,68,0.2);">
                <h3 style="color:#ff4d79; font-weight: 600;">Predicted 1h Away</h3>
                <div class="value predict" id="predict_val">--</div>
            </div>
            
            <p class="api-note" id="api_note">Source: Open-Meteo</p>
        </div>

        <p class="api-note" id="error_msg" style="color: #ff6b6b; display:none;"></p>
    </div>

    <script>
        // Initialize Interactive Map
        // Starting with a generic view centered near Central India
        const map = L.map('map').setView([20.5937, 78.9629], 4);
        
        // Use CartoDB Dark Matter tile layer so the map matches your sleek dark UI theme!
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        let marker = null;

        // Listen for Map Clicks!
        map.on('click', function(e) {
            const lat = e.latlng.lat;
            const lon = e.latlng.lng;
            
            // Auto fill the inputs
            document.getElementById('lat').value = lat.toFixed(4);
            document.getElementById('lon').value = lon.toFixed(4);

            // Move the pin marker, or create it if clicking for the first time
            if (marker) {
                marker.setLatLng(e.latlng);
            } else {
                marker = L.marker(e.latlng).addTo(map);
            }
        });

        function getLocation() {
            if (navigator.geolocation) {
                const btn = document.getElementById("locationBtn");
                btn.innerText = "Locating...";
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        document.getElementById("lat").value = lat.toFixed(4);
                        document.getElementById("lon").value = lon.toFixed(4);
                        btn.innerText = "📍 Location Found";
                        btn.style.color = "#a8ff78";
                        btn.style.borderColor = "#a8ff78";

                        // Update Map to fly over to the new real-time location and drop a pin!
                        const latlng = [lat, lon];
                        map.setView(latlng, 11);
                        if (marker) {
                            marker.setLatLng(latlng);
                        } else {
                            marker = L.marker(latlng).addTo(map);
                        }
                    },
                    (error) => {
                        alert("Geolocation failed check browser permissions. Error: " + error.message);
                        btn.innerText = "📍 Use My Realtime Location";
                    }
                );
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        }

        async function predict() {
            const lat = document.getElementById("lat").value;
            const lon = document.getElementById("lon").value;
            
            if (!lat || !lon) {
                alert("Please enter both latitude and longitude.");
                return;
            }

            document.getElementById("results").style.display = "none";
            document.getElementById("error_msg").style.display = "none";
            document.getElementById("loader").style.display = "block";

            try {
                const response = await fetch("/api/predict", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ lat, lon })
                });
                
                const data = await response.json();
                document.getElementById("loader").style.display = "none";

                if (response.ok && data.success) {
                    document.getElementById("current_val").innerText = data.current_pm25;
                    document.getElementById("predict_val").innerText = data.predicted_pm25;
                    document.getElementById("api_note").innerText = `Live Data Source: ${data.source}`;
                    document.getElementById("results").style.display = "block";
                } else {
                    document.getElementById("error_msg").innerText = "Server Error: " + (data.error || "failed prediction");
                    document.getElementById("error_msg").style.display = "block";
                }
            } catch (err) {
                document.getElementById("loader").style.display = "none";
                document.getElementById("error_msg").innerText = "Network Error: Could not reach the server.";
                document.getElementById("error_msg").style.display = "block";
            }
        }
    </script>
</body>
</html>
